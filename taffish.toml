[package]
name = "rnaseq-index-flow"
kind = "flow"
version = "0.2.0"
release = 1
license = "Apache-2.0"
main = "src/main.taf"

[repository]
url = "https://github.com/taffish/rnaseq-index-flow"

[command]
name = "taf-rnaseq-index-flow"

[runtime]
pipe = false
command_mode = false

[meta]
domain = "bio"
categories = ["rna-seq", "reference", "index", "workflow", "transcriptomics"]
keywords = ["rnaseq-index-flow", "rna-seq", "transcriptome", "reference", "salmon", "kallisto", "hisat2", "gffread", "agat", "tx2gene"]
description = "TAFFISH RNA-seq reference preparation flow for transcript FASTA, tx2gene.tsv, Salmon/Kallisto transcript indexes, and optional HISAT2 genome index generation."

[upstream]
name = "rnaseq-index-flow"
type = "taffish-flow"
homepage = "https://github.com/taffish/rnaseq-index-flow"
version = "0.2.0"
license = "Apache-2.0"
description = "TAFFISH-maintained RNA-seq reference-index flow composed from version-pinned TAFFISH tool apps."

[dependencies]
taf-agat = "1.7.0-r1"
taf-gffread = "0.12.9-r1"
taf-salmon = "1.11.4-r1"
taf-kallisto = "0.52.0-r1"
taf-hisat2 = "2.2.2-r2"
